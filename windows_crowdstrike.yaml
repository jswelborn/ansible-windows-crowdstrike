---
- name: Install CrowdStrike on Windows
  hosts: all
  gather_facts: false

  vars_files:
    - vars/crowdstrike.yaml

  pre_tasks:
    - name: Set Kerberos password variable from available credential vars
      ansible.builtin.set_fact:
        kerberos_password: "{{ ansible_password | default(ansible_ssh_pass | default('')) }}"

    - name: Validate kinit with injected AAP credential
      ansible.builtin.shell: |
        printf '%s\n' "{{ kerberos_password }}" | /usr/bin/kinit -V "{{ ansible_user }}"
      delegate_to: localhost
      changed_when: false
      no_log: true

    - name: Gather Windows facts after Kerberos ticket is available
      ansible.windows.setup:

    - name: Validate CrowdStrike CID is provided
      ansible.builtin.assert:
        that:
          - crowdstrike_cid is defined
          - crowdstrike_cid | trim | length > 0
        fail_msg: "crowdstrike_cid must be provided by AAP credential unless crowdstrike_local_mode is true."
      when: not crowdstrike_local_mode
      no_log: true

  tasks:
    - name: Check whether CrowdStrike is already installed
      ansible.windows.win_shell: |
        $products = Get-ItemProperty `
          HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*, `
          HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\* `
          -ErrorAction SilentlyContinue |
          Where-Object {
            $_.DisplayName -match 'CrowdStrike'
          }

        if ($products) {
          "installed"
        } else {
          "missing"
        }
      register: crowdstrike_windows_check
      changed_when: false

    - name: Stop play if CrowdStrike already installed
      ansible.builtin.meta: end_play
      when: crowdstrike_windows_check.stdout | trim == "installed"

    - name: Ensure Windows install directory exists
      ansible.windows.win_file:
        path: "{{ crowdstrike_windows_install_path }}"
        state: directory

    - name: Set installer path
      ansible.builtin.set_fact:
        os_package_local_path: "{{ crowdstrike_windows_install_path }}\\{{ crowdstrike_windows_installer }}"

    - name: Download CrowdStrike Windows installer
      ansible.windows.win_get_url:
        url: "{{ crowdstrike_package_url }}{{ crowdstrike_windows_installer }}"
        dest: "{{ os_package_local_path }}"

    - name: Install CrowdStrike Windows Sensor
      ansible.windows.win_package:
        path: "{{ os_package_local_path }}"
        arguments: "/install /quiet /norestart CID={{ crowdstrike_cid }}"
        state: present
        expected_return_code:
          - 0
          - 3010
      async: 1200
      poll: 0
      register: crowdstrike_install
      when: not crowdstrike_local_mode
      no_log: true

    - name: Wait for CrowdStrike install to finish
      ansible.builtin.async_status:
        jid: "{{ crowdstrike_install.ansible_job_id }}"
      register: crowdstrike_install_result
      until: crowdstrike_install_result.finished
      retries: 60
      delay: 10
      when: not crowdstrike_local_mode
      no_log: true

    - name: Reset WinRM connection after CrowdStrike install
      ansible.builtin.meta: reset_connection

    - name: Wait for WinRM after CrowdStrike install
      ansible.windows.win_ping:
      register: crowdstrike_winrm_ready
      retries: 12
      delay: 10
      until: crowdstrike_winrm_ready is succeeded
      changed_when: false